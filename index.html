  <!-- ============================================================
       FADING VIDEO (custom rAF crossfade, no CSS transitions)
  ============================================================ -->
  <script type="text/babel">
    window.FadingVideo = function FadingVideo({ src, className, style }) {
      const videoRef = React.useRef(null);
      const rafRef   = React.useRef(null);
      const fadingOut = React.useRef(false);
      const FADE_MS      = 500;
      const FADE_OUT_LEAD = 0.55;

      const fadeTo = React.useCallback((target) => {
        const video = videoRef.current;
        if (!video) return;
        if (rafRef.current) cancelAnimationFrame(rafRef.current);
        const t0    = performance.now();
        const start = parseFloat(video.style.opacity) || 0;
        const tick  = (now) => {
          const p = Math.min((now - t0) / FADE_MS, 1);
          const e = 1 - (1 - p) * (1 - p); // easeOutQuad
          video.style.opacity = start + (target - start) * e;
          if (p < 1) rafRef.current = requestAnimationFrame(tick);
          else video.style.opacity = target;
        };
        rafRef.current = requestAnimationFrame(tick);
      }, []);

      React.useEffect(() => {
        const v = videoRef.current;
        if (!v) return;
        v.style.opacity = '0';

        const onLoaded = () => {
          v.style.opacity = '0';
          v.play().catch(() => {});
          fadeTo(1);
        };
        const onTime = () => {
          if (!fadingOut.current && v.duration > 0) {
            const rem = v.duration - v.currentTime;
            if (rem <= FADE_OUT_LEAD && rem > 0) {
              fadingOut.current = true;
              fadeTo(0);
            }
          }
        };
        const onEnded = () => {
          v.style.opacity = '0';
          setTimeout(() => {
            v.currentTime = 0;
            v.play().catch(() => {});
            fadingOut.current = false;
            fadeTo(1);
          }, 100);
        };

        v.addEventListener('loadeddata', onLoaded);
        v.addEventListener('timeupdate', onTime);
        v.addEventListener('ended', onEnded);
        if (v.readyState >= 2) onLoaded();

        return () => {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          v.removeEventListener('loadeddata', onLoaded);
          v.removeEventListener('timeupdate', onTime);
          v.removeEventListener('ended', onEnded);
        };
      }, [fadeTo]);

      return (
        <video
          ref={videoRef}
          src={src}
          autoPlay muted playsInline preload="auto"
          className={className}
          style={{ opacity: 0, ...style }}
        />
      );
    };
  </script>

        e.preventDefault();
        setStatus('sending');
        try {
          const res = await fetch('https://formspree.io/f/mqeogyyg', {
            method: 'POST',
            body: new FormData(e.target),
            headers: { Accept: 'application/json' },

          if (res.ok) { setStatus('ok'); e.target.reset(); }
          else setStatus('err');

                    <div key={label} className="flex items-center gap-4">
                      <div className="liquid-glass w-10 h-10 rounded-full flex items-center justify-center text-base flex-shrink-0">{e}</div>
                      <div>
                        <div className="text-[10px] text-white/38 font-body tracking-widest uppercase">{label}</div>

                  ))}

                <div className="mt-10 flex gap-2.5 flex-wrap">

                    <span key={b} className="liquid-glass rounded-full px-3 py-1.5 text-[10px] text-white/50 font-body">{b}</span>

                {status === 'ok' && (
                  <div className="mb-5 p-4 rounded-2xl border border-green-500/20 bg-green-900/20 text-green-400 text-sm font-body">
                    ✓ Enquiry sent! We'll be in touch shortly.
                  </div>
                )}
                {status === 'err' && (
                  <div className="mb-5 p-4 rounded-2xl border border-red-500/20 bg-red-900/20 text-red-400 text-sm font-body">
                    Something went wrong. Email us at{' '}
                    <a href="mailto:enquiry@rsenterprises.in" className="underline">enquiry@rsenterprises.in</a>

                <form onSubmit={handleSubmit} className="space-y-4">

                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">

  <!-- ============================================================

  <script type="text/babel">
    window.FloatingElements = function FloatingElements() {
      const { motion } = window.Motion;
      const [sticky, setSticky] = React.useState(false);
      React.useEffect(() => {
        const fn = () => setSticky(window.scrollY > 500);
        window.addEventListener('scroll', fn, { passive:true });
        return () => window.removeEventListener('scroll', fn);
      }, []);

      return (
        <>
          {/* Sticky quote button */}
          {sticky && (
            <motion.a href="#contact"
              initial={{ opacity:0, x:30 }} animate={{ opacity:1, x:0 }}
              className="fixed bottom-6 right-6 z-50 bg-gold text-black font-body font-semibold text-xs px-5 py-3 rounded-full shadow-lg hover:brightness-110 transition-all">
              Get Quote
            </motion.a>
          )}
        </>
      );
    };
  </script>
