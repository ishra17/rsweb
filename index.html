    .btn-primary { background: #211E1A; color: #FBFAF7; }

    .btn-gold { background: #D4AF37; color: #211E1A; }

    .btn-ghost { background: #fff; color: #211E1A; border-color: #E2DACC; }

    .btn-ghost-dark { background: transparent; color: #FBFAF7; border-color: rgba(251,250,247,0.25); }
    .btn-ghost-dark:hover { border-color: rgba(251,250,247,0.55); background: rgba(251,250,247,0.06); }

    /* ── Form ── */
    .form-field {
      width: 100%; background: #fff; border: 1px solid #E2DACC; color: #211E1A;
      padding: 0.7rem 0.9rem; border-radius: 0.75rem; font-family: 'Barlow', sans-serif;

    /* ── Headline word reveal ── */
    @keyframes wordBlurIn {
      0%   { opacity:0; filter:blur(10px); transform:translateY(14px); }
      100% { opacity:1; filter:blur(0);   transform:translateY(0); }
    }
    .blur-word { display:inline-block; opacity:0; animation: wordBlurIn 0.7s cubic-bezier(0,0,0.2,1) forwards; }

    .factory { position:absolute; inset:0; overflow:hidden; }
    .factory svg { width:100%; height:100%; display:block; }
    @keyframes sheet-run {
      0% { transform: translateX(-240px) rotate(-7deg); opacity:0; }
      12% { opacity:.5; } 88% { opacity:.5; }
      100% { transform: translateX(820px) rotate(-7deg); opacity:0; }
    }
    .sheet { animation: sheet-run 9s linear infinite; }
    .sheet-2 { animation-delay: 3s; } .sheet-3 { animation-delay: 6s; }
    @keyframes diecut-draw {
      0% { stroke-dashoffset: 1600; opacity:0; } 3% { opacity:1; }
      17% { stroke-dashoffset: 0; opacity:1; } 26% { opacity:1; } 33% { opacity:0; } 100% { opacity:0; }
    }
    .diecut { stroke-dasharray: 1600; animation: diecut-draw 11s ease-in-out infinite; filter: drop-shadow(0 0 5px rgba(176,137,47,.45)); }
    @keyframes box-assemble {
      0%,22% { opacity:0; transform: translateY(46px) scale(.55); }
      35% { opacity:1; transform: translateY(0) scale(1); }
      76% { opacity:1; transform: translateY(-7px) scale(1); }
      87% { opacity:0; transform: translateY(-22px) scale(1.03); } 100% { opacity:0; }
    }
    .iso-box { transform-box: fill-box; transform-origin:center; animation: box-assemble 11s ease-in-out infinite; }
    @keyframes box-stack {
      0%,45% { opacity:0; transform: translateY(34px) scale(.6); }
      57% { opacity:.85; transform: translateY(0) scale(1); } 78% { opacity:.85; } 87% { opacity:0; } 100% { opacity:0; }
    }
    .iso-stack { transform-box: fill-box; transform-origin:center; animation: box-stack 11s ease-in-out infinite; }
    @keyframes scan {
      0% { transform: translateX(-120px); opacity:0; } 12% { opacity:.5; } 88% { opacity:.5; }
      100% { transform: translateX(720px); opacity:0; }
    }
    .scan-line { animation: scan 6.5s ease-in-out infinite; }
    @keyframes roll { to { transform: rotate(360deg); } }
    .roller { transform-box: fill-box; transform-origin:center; animation: roll 3.4s linear infinite; }
    .roller-2 { animation-duration: 2.6s; }
    @keyframes press-sheet {
      0% { transform: translateX(-180px); opacity:0; } 8% { opacity:1; } 92% { opacity:1; }
      100% { transform: translateX(860px); opacity:0; }
    }
    .press-sheet { animation: press-sheet 7s linear infinite; }
    .press-sheet-2 { animation-delay: 2.3s; } .press-sheet-3 { animation-delay: 4.6s; }

    .gold-bar { width: 28px; height: 2px; border-radius: 2px; background: #D4AF37; transition: width 0.45s ease; }

  <script type="text/babel">
    window.ContactSection = function ContactSection() {
      const { motion } = window.Motion;
      const [ref, vis] = useVisible(0.05);
      const [status, setStatus] = React.useState('idle');
      const handleSubmit = async (e) => {
        e.preventDefault();
        setStatus('sending');
        try {
          const res = await fetch('https://formspree.io/f/mqeogyyg', {
            method: 'POST', body: new FormData(e.target), headers: { Accept: 'application/json' },
          });
          if (res.ok) { setStatus('ok'); e.target.reset(); } else setStatus('err');
        } catch { setStatus('err'); }
      };
      return (
        <section id="contact" className="bg-white py-24 lg:py-28">
          <div className="max-w-6xl mx-auto px-6 lg:px-8" ref={ref}>
            <div className="grid lg:grid-cols-2 gap-12 lg:gap-16 items-start">
              <motion.div {...fadeUp(0)} animate={vis ? { opacity:1, y:0 } : {}}>
                <p className="eyebrow">Contact</p>
                <h2 className="h-serif text-4xl md:text-5xl tracking-[-1px] mt-3 leading-[1.05]">Let's build something together</h2>
                <p className="text-graphite mt-5 leading-relaxed max-w-md">
                  Tell us about your packaging requirements. Our specialists will craft a tailored solution and respond promptly.
                </p>
                <div className="mt-9 space-y-4">
                  {[
                    { icon:'mail', label:'Email', val:'enquiry@rsenterprises.in', href:'mailto:enquiry@rsenterprises.in' },
                    { icon:'pin',  label:'Address', val:'C-20, Sector 4, Noida, Uttar Pradesh 201301', href:'https://maps.google.com/?q=C-20,+Sector+4,+Noida,+Uttar+Pradesh+201301' },
                  ].map((c) => (
                    <div key={c.label} className="flex items-center gap-4">
                      <span className="icon-badge shrink-0"><Ico name={c.icon} cls="h-5 w-5" /></span>
                      <div>
                        <div className="form-label">{c.label}</div>
                        {c.href ? <a href={c.href} className="text-ink font-medium hover:text-gold transition-colors">{c.val}</a> : <div className="text-ink font-medium">{c.val}</div>}
                      </div>
                    </div>
                  ))}
                </div>
                <div className="mt-9 flex flex-wrap gap-2.5">
                  {['Pan-India Delivery','Bulk Discounts','Eco Materials'].map((b) => (
                    <span key={b} className="inline-flex items-center gap-1.5 rounded-full bg-cream border border-line px-3 py-1.5 text-xs font-medium text-graphite">
                      <Ico name="check" cls="h-3.5 w-3.5 text-gold" />{b}
                    </span>
                  ))}
                </div>
              </motion.div>

              <motion.div {...fadeUp(0.15)} animate={vis ? { opacity:1, y:0 } : {}} className="card p-7 md:p-8 bg-white">
                <h3 className="h-serif text-2xl">Request a quotation</h3>
                <p className="text-sm text-graphite mt-1">Fill in your details and we’ll be in touch shortly.</p>
                {status === 'ok' && (
                  <div className="mt-5 p-4 rounded-xl border border-green-600/25 bg-green-50 text-green-800 text-sm">✓ Enquiry sent! We’ll be in touch shortly.</div>
                )}
                {status === 'err' && (
                  <div className="mt-5 p-4 rounded-xl border border-red-500/25 bg-red-50 text-red-700 text-sm">
                    Something went wrong. Email us at <a href="mailto:enquiry@rsenterprises.in" className="underline">enquiry@rsenterprises.in</a>.
                  </div>
                )}
                <form onSubmit={handleSubmit} className="mt-6 space-y-4">
                  <div className="grid sm:grid-cols-2 gap-4">
                    <div><label className="form-label">Name *</label><input type="text" name="name" required className="form-field mt-1.5" placeholder="Your full name" /></div>
                    <div><label className="form-label">Company</label><input type="text" name="company" className="form-field mt-1.5" placeholder="Company name" /></div>
                  </div>
                  <div className="grid sm:grid-cols-2 gap-4">
                    <div><label className="form-label">Mobile *</label><input type="tel" name="phone" required className="form-field mt-1.5" placeholder="+91 XXXXX XXXXX" /></div>
                    <div><label className="form-label">Email *</label><input type="email" name="email" required className="form-field mt-1.5" placeholder="you@company.com" /></div>
                  </div>
                  <div><label className="form-label">Message *</label><textarea name="message" required rows="4" className="form-field mt-1.5" style={{ resize:'vertical' }} placeholder="Tell us about your requirements, dimensions, timeline…"></textarea></div>
                  <button type="submit" disabled={status === 'sending'} className="btn btn-gold w-full disabled:opacity-60 disabled:cursor-not-allowed">
                    {status === 'sending' ? 'Sending…' : <React.Fragment>Request a Quotation <Ico name="arrow" cls="h-4 w-4" /></React.Fragment>}
                  </button>
                  <p className="text-xs text-muted text-center">🔒 Your details are kept private and used only to respond to your enquiry.</p>
                </form>
              </motion.div>
            </div>
          </div>
        </section>
      );
    };
  </script>
